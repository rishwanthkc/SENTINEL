name: Selenium E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sentinel-web/package-lock.json

      - name: Install Node.js dependencies
        run: |
          cd sentinel-web
          npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sentinel-web/tests/requirements.txt

      - name: Install Python dependencies
        run: |
          cd sentinel-web
          pip install -r tests/requirements.txt

      - name: Run E2E Tests
        run: |
          cd sentinel-web
          python tests/run_tests.py

      - name: Commit and Push E2E Test Report
        if: always()
        run: |
          git config --global user.name "jeevan-1223"
          git config --global user.email "192472080.simats@saveetha.com"
          git add -f sentinel-web/E2E_Test_Report_Sentinel.xlsx
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: auto-update E2E verification report [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit. Skipping push."
          fi

      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report
          path: sentinel-web/E2E_Test_Report_Sentinel*.xlsx
