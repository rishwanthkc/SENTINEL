name: Backend Load Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  load-test:
    name: Run Backend Load Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sentinel_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install openpyxl requests
          cd sentinel-backend
          pip install -r requirements.txt

      - name: Start Backend API
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: sentinel_db
        run: |
          cd sentinel-backend
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Run Load Test
        run: |
          cd security-testing/scripts
          python load_test.py 100 60

      - name: Commit and Push Load Test Report
        run: |
          git config --global user.name "jeevan-1223"
          git config --global user.email "192472080.simats@saveetha.com"
          git add -f security-testing/scripts/Sentinel_Load_Test_Report.xlsx
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: auto-update Load Test report [skip ci]"
            git pull --rebase origin ${{ github.ref }}
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes to commit. Skipping push."
          fi

      - name: Upload Load Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-report
          path: security-testing/scripts/Sentinel_Load_Test_Report.xlsx
